<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FADE — Trade Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #F5C842;
  --yellow-dim: rgba(245,200,66,0.12);
  --yellow-border: rgba(245,200,66,0.3);
  --blue: #4A9EFF;
  --blue-dim: rgba(74,158,255,0.12);
  --blue-border: rgba(74,158,255,0.3);
  --bg: #0C0C0E;
  --bg2: #111114;
  --bg3: #18181D;
  --bg4: #1E1E25;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #F0F0F2;
  --text2: #8A8A96;
  --text3: #55555F;
  --green: #3DD68C;
  --green-dim: rgba(61,214,140,0.12);
  --red: #FF5252;
  --red-dim: rgba(255,82,82,0.12);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; }
body { min-height: 100vh; }

/* NAV */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 60px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  background: rgba(12,12,14,0.92);
  backdrop-filter: blur(12px);
}
.nav-logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px;
  letter-spacing: -0.5px; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.nav-logo span { color: var(--yellow); }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab {
  padding: 6px 16px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; cursor: pointer;
  color: var(--text2); border: none; background: none;
  transition: all 0.15s;
}
.nav-tab:hover { color: var(--text); background: var(--bg3); }
.nav-tab.active { color: var(--yellow); background: var(--yellow-dim); }
.nav-badge {
  background: var(--bg3); border: 1px solid var(--border2);
  padding: 4px 12px; border-radius: 100px;
  font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace;
}

/* PAGES */
.page { display: none; }
.page.active { display: block; }

/* LOG PAGE */
.log-layout { display: grid; grid-template-columns: 420px 1fr; min-height: calc(100vh - 60px); }
.panel-left {
  border-right: 1px solid var(--border);
  padding: 2rem;
  display: flex; flex-direction: column; gap: 1.5rem;
}
.panel-right { padding: 2rem; overflow-y: auto; }

.upload-zone {
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  padding: 2.5rem 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  background: var(--bg2);
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--yellow); background: var(--yellow-dim); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-icon {
  width: 44px; height: 44px; margin: 0 auto 12px;
  background: var(--bg4); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.upload-icon svg { width: 20px; height: 20px; stroke: var(--yellow); fill: none; stroke-width: 1.5; }
.upload-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.upload-sub { font-size: 12px; color: var(--text2); }

.preview-img { width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-top: 0.5rem; display: none; }

.ai-btn {
  width: 100%; padding: 12px; border-radius: var(--radius-sm);
  background: var(--yellow); color: #0C0C0E;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
  border: none; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.ai-btn:hover { background: #f0c030; }
.ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.ai-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

.ai-result {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem;
  display: none; flex-direction: column; gap: 1rem;
}
.ai-result.visible { display: flex; }
.result-header { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-family: 'DM Mono', monospace; }

.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; font-family: 'DM Mono', monospace; }
.field input, .field select {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); font-size: 14px; height: 36px;
  border-radius: var(--radius-sm); padding: 0 10px;
  font-family: 'DM Mono', monospace; width: 100%;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus { outline: none; border-color: var(--blue); }
.field select option { background: var(--bg3); }

.save-btn {
  width: 100%; padding: 11px; border-radius: var(--radius-sm);
  background: var(--blue-dim); border: 1px solid var(--blue-border);
  color: var(--blue); font-weight: 600; font-size: 14px;
  cursor: pointer; transition: all 0.15s; font-family: 'Syne', sans-serif;
}
.save-btn:hover { background: var(--blue); color: #fff; }

.processing {
  display: none; align-items: center; gap: 10px;
  padding: 12px; border-radius: var(--radius-sm);
  background: var(--blue-dim); border: 1px solid var(--blue-border);
  font-size: 13px; color: var(--blue);
}
.processing.visible { display: flex; }
.spinner {
  width: 16px; height: 16px; border: 2px solid var(--blue-border);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin 0.7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* TRADE LIST */
.trades-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.25rem;
}
.trades-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
.clear-btn {
  font-size: 12px; color: var(--text3); background: none; border: none;
  cursor: pointer; padding: 4px 8px; border-radius: 6px;
}
.clear-btn:hover { color: var(--red); background: var(--red-dim); }

.trade-list { display: flex; flex-direction: column; gap: 8px; }
.trade-row {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.25rem;
  display: grid; grid-template-columns: 90px 1fr 1fr 1fr 1fr 100px 28px;
  align-items: center; gap: 12px;
  transition: border-color 0.15s;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.trade-row:hover { border-color: var(--border2); }
.tr-coin { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
.tr-meta { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.tr-cell-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; font-family: 'DM Mono', monospace; }
.tr-cell-val { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text2); }
.badge {
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 100px; text-align: center; white-space: nowrap;
  font-family: 'DM Mono', monospace;
}
.b-fullwin { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,214,140,0.2); }
.b-partwin { background: rgba(61,214,140,0.07); color: #2aa868; border: 1px solid rgba(61,214,140,0.15); }
.b-watching { background: var(--yellow-dim); color: var(--yellow); border: 1px solid var(--yellow-border); }
.b-partloss { background: rgba(255,82,82,0.07); color: #cc4444; border: 1px solid rgba(255,82,82,0.15); }
.b-stopped { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,82,82,0.2); }
.b-neverentered { background: var(--bg4); color: var(--text3); border: 1px solid var(--border); }
.pnl-pos { color: var(--green); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
.pnl-neg { color: var(--red); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
.pnl-neu { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 13px; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; padding: 2px 6px; border-radius: 6px; line-height: 1; }
.del-btn:hover { color: var(--red); background: var(--red-dim); }
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--text3); font-size: 14px; }
.empty-state p { margin-top: 8px; }

/* STATS PAGE */
.stats-page { padding: 2rem; max-width: 1200px; margin: 0 auto; }
.stats-heading {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px;
  margin-bottom: 2rem; letter-spacing: -0.5px;
}
.stats-heading span { color: var(--yellow); }

.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 2rem; }
.kpi {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem 1.5rem;
  transition: border-color 0.15s;
}
.kpi:hover { border-color: var(--border2); }
.kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 10px; font-family: 'DM Mono', monospace; }
.kpi-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 30px; letter-spacing: -1px; }
.kpi-sub { font-size: 12px; color: var(--text3); margin-top: 4px; font-family: 'DM Mono', monospace; }
.kpi-val.yellow { color: var(--yellow); }
.kpi-val.blue { color: var(--blue); }
.kpi-val.green { color: var(--green); }
.kpi-val.red { color: var(--red); }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem;
}
.chart-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; margin-bottom: 1.25rem; color: var(--text2); }

/* Outcome donut */
.donut-wrap { display: flex; align-items: center; gap: 1.5rem; }
.donut-svg { flex-shrink: 0; }
.donut-legend { display: flex; flex-direction: column; gap: 8px; }
.legend-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-label { color: var(--text2); flex: 1; }
.legend-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); }

/* Equity curve */
.equity-wrap { height: 180px; position: relative; overflow: hidden; }
.equity-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }

/* Hour breakdown bars */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 12px; color: var(--text2); width: 80px; font-family: 'DM Mono', monospace; }
.bar-track { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: var(--yellow); transition: width 0.5s ease; }
.bar-fill.blue { background: var(--blue); }
.bar-pct { font-size: 12px; color: var(--text3); width: 36px; text-align: right; font-family: 'DM Mono', monospace; }

/* Ticker breakdown table */
.ticker-table { width: 100%; border-collapse: collapse; }
.ticker-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); text-align: left; padding: 6px 0; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; font-weight: 400; }
.ticker-table td { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); font-family: 'DM Mono', monospace; }
.ticker-table td:first-child { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; color: var(--text); }

.no-stats { text-align: center; padding: 4rem; color: var(--text3); font-size: 14px; }

/* Starting balance row */
.balance-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 1.5rem;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 1.5rem;
}
.balance-label { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
.balance-input-wrap { display: flex; align-items: center; gap: 0; }
.balance-prefix { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text3); padding: 0 8px 0 12px; background: var(--bg3); border: 1px solid var(--border2); border-right: none; border-radius: var(--radius-sm) 0 0 var(--radius-sm); height: 36px; display: flex; align-items: center; }
.balance-input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-size: 14px; height: 36px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 0 12px; font-family: 'DM Mono', monospace; width: 140px; transition: border-color 0.15s; }
.balance-input:focus { outline: none; border-color: var(--blue); }
.balance-hint { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; margin-left: 4px; }

/* Extended stats grid */
.kpi-grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 2rem; }
.kpi-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.full-col { margin-bottom: 16px; }
.chart-card-tall { min-height: 240px; }
.section-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text3); font-family: 'DM Mono', monospace;
  margin: 2rem 0 1rem; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* P&L scatter / individual trade bars */
.trade-pnl-bar-list { display: flex; flex-direction: column; gap: 5px; }
.trade-pnl-bar-row { display: flex; align-items: center; gap: 8px; }
.tpb-coin { font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 600; width: 52px; flex-shrink: 0; color: var(--text); }
.tpb-track { flex: 1; height: 20px; background: var(--bg3); border-radius: 4px; overflow: hidden; position: relative; }
.tpb-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500; min-width: 40px; transition: width 0.4s ease; white-space: nowrap; }
.tpb-fill.pos { background: rgba(61,214,140,0.2); color: var(--green); }
.tpb-fill.neg { background: rgba(255,82,82,0.2); color: var(--red); float: right; }

/* Streak & cadence stats */
.streak-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.streak-card { background: var(--bg3); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
.streak-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; letter-spacing: -1px; margin-bottom: 4px; }
.streak-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); font-family: 'DM Mono', monospace; }

/* Close reason split */
.split-row { display: flex; gap: 12px; margin-top: 8px; }
.split-item { flex: 1; background: var(--bg3); border-radius: var(--radius-sm); padding: 12px 14px; }
.split-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; }
.split-lbl { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }

/* Gain bucket analysis */
.bucket-table { width: 100%; border-collapse: collapse; }
.bucket-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); text-align: left; padding: 6px 0; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; font-weight: 400; }
.bucket-table td { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
.bucket-table td:first-child { color: var(--text); font-weight: 500; }

/* SCREENSHOT on trade row */
.tr-screenshot { width: 100%; margin-top: 10px; border-radius: var(--radius-sm); overflow: hidden; display: none; }
.tr-screenshot img { width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border); display: block; cursor: pointer; }
.trade-row-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); animation: fadeIn 0.3s ease; transition: border-color 0.15s; overflow: hidden; }
.trade-row-wrap:hover { border-color: var(--border2); }
.trade-row { padding: 1rem 1.25rem; display: grid; grid-template-columns: 90px 1fr 1fr 1fr 1fr 110px 60px; align-items: center; gap: 12px; }
.ss-btn { font-size: 11px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text3); border-radius: var(--radius-sm); padding: 5px 9px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.15s; white-space: nowrap; }
.ss-btn:hover { color: var(--yellow); border-color: var(--yellow-border); background: var(--yellow-dim); }
.ss-btn.has-shot { color: var(--green); border-color: rgba(61,214,140,0.3); background: var(--green-dim); }
.ss-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }

/* Screenshot lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; align-items: center; justify-content: center; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 90vh; border-radius: var(--radius); box-shadow: 0 0 80px rgba(0,0,0,0.8); }
.lightbox-close { position: fixed; top: 20px; right: 24px; font-size: 28px; color: var(--text3); cursor: pointer; background: none; border: none; line-height: 1; }
.lightbox-close:hover { color: var(--text); }

/* REVIEW PAGE */
.review-page { padding: 2rem; max-width: 1100px; margin: 0 auto; }
.review-heading { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -0.5px; margin-bottom: 6px; }
.review-heading span { color: var(--yellow); }
.review-sub { font-size: 13px; color: var(--text2); margin-bottom: 2rem; }

.review-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; align-items: start; }

/* Prompt cards sidebar */
.prompt-sidebar { display: flex; flex-direction: column; gap: 8px; }
.prompt-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  cursor: pointer; transition: all 0.15s;
}
.prompt-card:hover { border-color: var(--yellow-border); background: var(--yellow-dim); }
.prompt-card.active { border-color: var(--yellow); background: var(--yellow-dim); }
.pc-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 5px; }
.pc-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; color: var(--text); }
.pc-desc { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.5; }

/* Main review panel */
.review-main { display: flex; flex-direction: column; gap: 16px; }

.review-snapshot {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem 1.5rem;
}
.snapshot-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 12px; }
.snapshot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.snap-item { display: flex; flex-direction: column; gap: 3px; }
.snap-label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; }
.snap-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }
.snap-val.green { color: var(--green); }
.snap-val.red { color: var(--red); }
.snap-val.yellow { color: var(--yellow); }
.snap-val.blue { color: var(--blue); }

.prompt-output {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem;
  display: flex; flex-direction: column; gap: 1rem;
}
.po-header { display: flex; align-items: center; justify-content: space-between; }
.po-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
.po-actions { display: flex; gap: 8px; }
.po-btn {
  padding: 7px 14px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border2); background: var(--bg3);
  color: var(--text2); font-family: 'DM Mono', monospace;
  transition: all 0.15s;
}
.po-btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg4); }
.po-btn.primary { background: var(--yellow); color: #0C0C0E; border-color: var(--yellow); font-family: 'Syne', sans-serif; }
.po-btn.primary:hover { background: #f0c030; }

.prompt-text {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 1.25rem;
  font-size: 13px; line-height: 1.75; color: var(--text2);
  font-family: 'DM Sans', sans-serif; white-space: pre-wrap;
  min-height: 160px;
}
.prompt-text .highlight { color: var(--yellow); font-weight: 500; }
.prompt-text .data-inline { color: var(--blue); font-family: 'DM Mono', monospace; font-size: 12px; }

/* AI response area */
.ai-response-wrap {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem;
  display: none; flex-direction: column; gap: 1rem;
}
.ai-response-wrap.visible { display: flex; }
.air-header { display: flex; align-items: center; gap: 10px; }
.air-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--yellow); flex-shrink: 0; }
.air-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-family: 'DM Mono', monospace; }
.air-body { font-size: 14px; line-height: 1.8; color: var(--text2); white-space: pre-wrap; }
.air-body strong { color: var(--text); font-weight: 600; }
.air-thinking { display: flex; align-items: center; gap: 10px; color: var(--text3); font-size: 13px; font-family: 'DM Mono', monospace; }
.air-thinking .spinner { border-color: rgba(245,200,66,0.2); border-top-color: var(--yellow); }

.no-trades-review { text-align: center; padding: 4rem; color: var(--text3); font-size: 14px; }
.generate-all-btn {
  width: 100%; padding: 13px; border-radius: var(--radius-sm);
  background: var(--bg3); border: 1px dashed var(--yellow-border);
  color: var(--yellow); font-weight: 700; font-size: 14px;
  cursor: pointer; transition: all 0.15s; font-family: 'Syne', sans-serif;
  letter-spacing: 0.3px;
}
.generate-all-btn:hover { background: var(--yellow-dim); border-style: solid; }

/* CLOSE REASON BUTTONS */
.close-reason-wrap { display: flex; flex-direction: column; gap: 6px; grid-column: span 2; }
.close-reason-wrap label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; font-family: 'DM Mono', monospace; }
.close-reason-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cr-btn {
  padding: 9px 12px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border2); background: var(--bg3);
  color: var(--text2); font-family: 'DM Mono', monospace;
  transition: all 0.15s; text-align: center; letter-spacing: 0.3px;
}
.cr-btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg4); }
.cr-btn.active-target { background: var(--green-dim); border-color: rgba(61,214,140,0.4); color: var(--green); }
.cr-btn.active-time { background: var(--yellow-dim); border-color: var(--yellow-border); color: var(--yellow); }

/* close reason badge in trade row */
.cr-badge {
  font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500;
  padding: 2px 7px; border-radius: 100px; margin-top: 3px; display: inline-block;
}
.cr-badge.target { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,214,140,0.2); }
.cr-badge.time { background: var(--yellow-dim); color: var(--yellow); border: 1px solid var(--yellow-border); }
</style>
</head>
<body>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="Trade screenshot" onclick="event.stopPropagation()" />
</div>

<nav>
  <div class="nav-logo">FADE<span>.</span>TRACK</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('log')">Log Trade</button>
    <button class="nav-tab" onclick="showPage('stats')">Stats</button>
    <button class="nav-tab" onclick="showPage('review')">AI Review</button>
  </div>
  <div class="nav-badge" id="nav-count">0 trades</div>
</nav>

<!-- LOG PAGE -->
<div id="page-log" class="page active">
  <div class="log-layout">
    <div class="panel-left">
      <div>
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:4px">Add Trade</div>
        <div style="font-size:13px;color:var(--text2)">Log a trade manually after closing your position.</div>
      </div>

      <div class="field-grid" style="margin-bottom:10px">
          <div class="field"><label>Coin</label><input id="m-coin" placeholder="WAXUSDT" /></div>
          <div class="field"><label>Outcome</label>
            <select id="m-outcome">
              <option value="watching">Watching</option>
              <option value="fullwin">Full win</option>
              <option value="partwin">Partial win</option>
              <option value="partloss">Partial loss</option>
              <option value="stopped">Stopped out</option>
              <option value="neverentered">Never entered</option>
            </select>
          </div>
          <div class="field"><label>Entry</label><input id="m-entry" type="number" oninput="autoCalcPnl()" /></div>
          <div class="field"><label>Exit</label><input id="m-exit" type="number" oninput="autoCalcPnl()" /></div>
          <div class="field"><label>P&L $</label><input id="m-pnl" type="number" /></div>
          <div class="field"><label>P&L %</label><input id="m-pct" type="number" readonly style="color:var(--text2);cursor:default" placeholder="auto" /></div>
          <div class="field"><label>24h Gain %</label><input id="m-gain" type="number" /></div>
          <div class="close-reason-wrap">
            <label>Reason for Close</label>
            <div class="close-reason-btns">
              <button type="button" class="cr-btn" id="cr-target" onclick="toggleCloseReason('target')">🎯 Hit Target</button>
              <button type="button" class="cr-btn" id="cr-time" onclick="toggleCloseReason('time')">⏱ Time Stopped</button>
            </div>
          </div>
        </div>
        <button class="save-btn" onclick="saveManual()">Add Trade</button>
    </div>

    <div class="panel-right">
      <div class="trades-header">
        <div class="trades-title">Trade Log</div>
        <button class="clear-btn" onclick="clearAll()">Clear all</button>
      </div>
      <div class="trade-list" id="trade-list"></div>
      <div class="empty-state" id="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="1.2" style="margin:0 auto 12px;display:block"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <p>No trades logged yet.</p>
        <p style="margin-top:4px;font-size:12px">Fill in the form and hit Add Trade.</p>
      </div>
    </div>
  </div>
</div>

<!-- STATS PAGE -->
<div id="page-stats" class="page">
  <div class="stats-page">
    <div class="stats-heading">Performance <span>Overview</span></div>
    <div id="stats-content"></div>
  </div>
</div>

<!-- REVIEW PAGE -->
<div id="page-review" class="page">
  <div class="review-page">
    <div class="review-heading">AI Strategy <span>Review</span></div>
    <div class="review-sub">Select a review type — your trade data is automatically embedded into the prompt.</div>
    <div id="review-content"></div>
  </div>
</div>

<script>
const API_KEY_PLACEHOLDER = '';
let trades = JSON.parse(localStorage.getItem('fade-trades') || '[]');

function save() {
  localStorage.setItem('fade-trades', JSON.stringify(trades));
  updateNavCount();
}

function updateNavCount() {
  document.getElementById('nav-count').textContent = trades.length + ' trade' + (trades.length !== 1 ? 's' : '');
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  event.target.classList.add('active');
  if (p === 'stats') renderStats();
  if (p === 'log') renderTrades();
  if (p === 'review') renderReview();
}

// ── REVIEW PAGE ────────────────────────────────────────────────────────────

const PROMPT_TYPES = [
  {
    id: 'overall',
    cat: 'Strategy',
    title: 'Overall Performance',
    desc: 'Full strategy audit across all trades',
    build: buildOverallPrompt
  },
  {
    id: 'winloss',
    cat: 'Edge',
    title: 'Win/Loss Patterns',
    desc: 'What separates your winners from losers',
    build: buildWinLossPrompt
  },
  {
    id: 'sizing',
    cat: 'Risk',
    title: 'Position Sizing',
    desc: 'Are your $ returns matching your % moves?',
    build: buildSizingPrompt
  },
  {
    id: 'entry',
    cat: 'Execution',
    title: 'Entry Quality',
    desc: 'Reviewing your entry vs 24h gain signal',
    build: buildEntryPrompt
  },
  {
    id: 'exit',
    cat: 'Execution',
    title: 'Exit Discipline',
    desc: 'Are you exiting too early or too late?',
    build: buildExitPrompt
  },
  {
    id: 'coins',
    cat: 'Market',
    title: 'Coin Selection',
    desc: 'Which assets are working best for you',
    build: buildCoinPrompt
  },
  {
    id: 'improvement',
    cat: 'Growth',
    title: 'Next Steps',
    desc: 'Concrete improvements to focus on',
    build: buildImprovementPrompt
  }
];

let activePromptId = 'overall';

function getTradeSnapshot() {
  const entered = trades.filter(t => ['fullwin','partwin','partloss','stopped'].includes(t.outcome));
  const wins = trades.filter(t => ['fullwin','partwin'].includes(t.outcome));
  const losses = trades.filter(t => ['partloss','stopped'].includes(t.outcome));
  const pnlPcts = entered.map(t => t.pct_pnl).filter(v => v !== null && v !== undefined && !isNaN(v));
  const pnlDollars = entered.map(t => t.pnl).filter(v => v !== null && !isNaN(v));
  const wr = entered.length ? (wins.length / entered.length * 100) : 0;
  const avgPct = pnlPcts.length ? pnlPcts.reduce((a,b)=>a+b,0)/pnlPcts.length : null;
  const totalDollar = pnlDollars.length ? pnlDollars.reduce((a,b)=>a+b,0) : null;
  return { entered, wins, losses, wr, avgPct, totalDollar, pnlPcts, pnlDollars };
}

function formatTradeTable() {
  if (!trades.length) return 'No trades logged yet.';
  return trades.map(t => {
    const pct = t.pct_pnl !== null && t.pct_pnl !== undefined ? `${t.pct_pnl > 0 ? '+' : ''}${t.pct_pnl.toFixed(2)}%` : (t.entry && t.exit ? `${(((t.entry-t.exit)/t.entry)*100).toFixed(2)}%` : 'N/A');
    const dollar = t.pnl !== null ? `${t.pnl >= 0 ? '+' : ''}$${Math.abs(t.pnl).toFixed(2)}` : 'N/A';
    const entry = t.entry ? `$${t.entry}` : 'N/A';
    const exit = t.exit ? `$${t.exit}` : 'N/A';
    const gain = t.gain_24h ? `+${t.gain_24h}%` : 'N/A';
    const cr = t.close_reason === 'target' ? 'Hit Target' : t.close_reason === 'time' ? 'Time Stopped' : 'N/A';
    return `• ${t.coin.replace('USDT','').replace('USDT.P','')} | ${t.outcome.toUpperCase()} | Entry: ${entry} → Exit: ${exit} | P&L: ${pct} / ${dollar} | 24h gain at signal: ${gain} | Close reason: ${cr} | Date: ${t.date}`;
  }).join('\n');
}

function buildOverallPrompt() {
  const s = getTradeSnapshot();
  return `You are a professional crypto trading coach reviewing a short-selling / fade strategy.

Here is the trader's full trade log:
${formatTradeTable()}

SUMMARY STATS:
- Total signals: ${trades.length}
- Entered trades: ${s.entered.length}
- Win rate: ${s.wr.toFixed(1)}% (${s.wins.length} wins / ${s.losses.length} losses)
- Avg % P&L per trade: ${s.avgPct !== null ? `${s.avgPct >= 0 ? '+' : ''}${s.avgPct.toFixed(2)}%` : 'N/A'}
- Total $ P&L: ${s.totalDollar !== null ? `${s.totalDollar >= 0 ? '+' : ''}$${s.totalDollar.toFixed(2)}` : 'N/A'}

Please provide a thorough strategy review covering:
1. Overall edge assessment — is there a genuine edge here based on the data?
2. Win rate quality — are wins and losses roughly balanced in magnitude?
3. What the data suggests about the trader's strengths
4. The 2–3 most significant weaknesses visible in the data
5. A clear overall verdict: is this strategy profitable, breakeven, or at risk?

Be direct and honest. Use the actual numbers. Don't pad the response.`;
}

function buildWinLossPrompt() {
  const wins = trades.filter(t => ['fullwin','partwin'].includes(t.outcome));
  const losses = trades.filter(t => ['partloss','stopped'].includes(t.outcome));
  const winLines = wins.map(t => {
    const pct = t.pct_pnl !== null ? `${t.pct_pnl.toFixed(2)}%` : 'N/A';
    return `  WIN: ${t.coin.replace('USDT','')} | ${t.outcome} | ${pct} | Entry $${t.entry} → Exit $${t.exit} | 24h: ${t.gain_24h ? '+'+t.gain_24h+'%' : 'N/A'}`;
  }).join('\n');
  const lossLines = losses.map(t => {
    const pct = t.pct_pnl !== null ? `${t.pct_pnl.toFixed(2)}%` : 'N/A';
    return `  LOSS: ${t.coin.replace('USDT','')} | ${t.outcome} | ${pct} | Entry $${t.entry} → Exit $${t.exit} | 24h: ${t.gain_24h ? '+'+t.gain_24h+'%' : 'N/A'}`;
  }).join('\n');
  return `You are a trading coach analysing patterns in a crypto fade/short strategy.

WINNING TRADES (${wins.length}):
${winLines || '  None yet'}

LOSING TRADES (${losses.length}):
${lossLines || '  None yet'}

Analyse:
1. What do the winning trades have in common? (entry price range, 24h gain at signal, outcome type)
2. What do the losing trades have in common?
3. Is there a clear pattern that separates wins from losses?
4. What is the "ideal setup" based on this data — what conditions correlate most strongly with a profitable fade?
5. Any specific coins or price ranges to avoid or target?

Give concrete, pattern-based answers using the actual trade data above.`;
}

function buildSizingPrompt() {
  const withBoth = trades.filter(t => t.pct_pnl !== null && t.pnl !== null && !isNaN(t.pnl));
  const lines = withBoth.map(t =>
    `  ${t.coin.replace('USDT','')} | ${t.pct_pnl.toFixed(2)}% move | $${Math.abs(t.pnl).toFixed(2)} P&L`
  ).join('\n');
  return `You are a risk management coach reviewing a crypto trader's position sizing.

TRADES WITH BOTH % AND $ P&L DATA:
${lines || '  No trades with full data yet — add both Entry/Exit and P&L $ fields to get sizing analysis.'}

Analyse:
1. Is the trader sizing positions consistently, or is there a large spread between % return and $ return across trades?
2. Which trades had a high % move but small $ return, suggesting undersizing?
3. Which trades had a large $ return from a small % move, suggesting appropriate or aggressive sizing?
4. What is the implied average position size across these trades?
5. Recommendation: should the trader normalise position sizing, and if so, around what notional amount given their % edge?

Be specific with numbers. Calculate implied position sizes where possible.`;
}

function buildEntryPrompt() {
  const withGain = trades.filter(t => t.gain_24h !== null && t.entry);
  const lines = withGain.map(t => {
    const pct = t.pct_pnl !== null ? `${t.pct_pnl.toFixed(2)}%` : 'N/A';
    return `  ${t.coin.replace('USDT','')} | 24h gain at signal: +${t.gain_24h}% | Entry: $${t.entry} | Outcome: ${t.outcome} | P&L: ${pct}`;
  }).join('\n');
  return `You are a trading coach reviewing entry quality for a crypto fade strategy.

Context: This trader shorts (fades) coins that have pumped. The "24h Gain" column is the coin's % gain in the 24 hours leading up to the entry — the core signal strength indicator.

TRADE ENTRIES WITH 24H GAIN DATA:
${lines || '  No trades with 24h gain data yet.'}

Analyse:
1. Is there a sweet spot in the 24h gain % that produces the best fade outcomes? (e.g., does +50-100% outperform +200%+?)
2. Do entries after very large pumps (100%+) perform differently than moderate pumps?
3. Is there a minimum 24h gain threshold that seems to filter out poor setups?
4. Based on the data, what is the ideal 24h gain range to look for when selecting a fade candidate?
5. Any patterns in entry price levels (low cap micro-price vs higher-price coins)?`;
}

function buildExitPrompt() {
  const withPrices = trades.filter(t => t.entry && t.exit && t.outcome !== 'neverentered' && t.outcome !== 'watching');
  const lines = withPrices.map(t => {
    const pct = t.pct_pnl !== null ? `${t.pct_pnl.toFixed(2)}%` : 'N/A';
    const direction = t.exit < t.entry ? 'price fell ✓' : 'price rose ✗';
    const cr = t.close_reason === 'target' ? 'Hit Target' : t.close_reason === 'time' ? 'Time Stopped' : 'Not recorded';
    return `  ${t.coin.replace('USDT','')} | ${t.outcome} | Entry $${t.entry} → Exit $${t.exit} | Move: ${pct} (${direction}) | Closed: ${cr}`;
  }).join('\n');
  const targetCount = withPrices.filter(t => t.close_reason === 'target').length;
  const timeCount = withPrices.filter(t => t.close_reason === 'time').length;
  return `You are a trading coach reviewing exit discipline for a crypto fade/short strategy.

CLOSED TRADES (with exit reason):
${lines || '  No closed trades yet.'}

Exit reason summary: ${targetCount} Hit Target · ${timeCount} Time Stopped · ${withPrices.length - targetCount - timeCount} not recorded

Analyse:
1. For trades closed at "Hit Target" — are these genuinely full moves or is the trader exiting too early based on the % captured?
2. For trades closed via "Time Stopped" — what's the typical P&L? Is time-stopping a disciplined tool or an avoidance mechanism?
3. Which exit reason correlates with better outcomes — hitting target or time-stopping?
4. Are there any losing trades that were time-stopped when they could have recovered? Any winning trades that reversed after a delayed exit?
5. Recommendation: is this trader's exit discipline working? Should they rely more on targets, time stops, or a mix?

Be specific with numbers from the data above.`;
}

function buildCoinPrompt() {
  const coinMap = {};
  trades.forEach(t => {
    const k = t.coin.replace('USDT','').replace('USDT.P','');
    if (!coinMap[k]) coinMap[k] = [];
    coinMap[k].push(t);
  });
  const lines = Object.entries(coinMap).map(([coin, ts]) => {
    const wins = ts.filter(t => ['fullwin','partwin'].includes(t.outcome)).length;
    const pcts = ts.map(t => t.pct_pnl).filter(v => v !== null && !isNaN(v));
    const avgPct = pcts.length ? (pcts.reduce((a,b)=>a+b,0)/pcts.length).toFixed(2) : 'N/A';
    return `  ${coin}: ${ts.length} trade(s), ${wins} win(s), avg P&L: ${avgPct !== 'N/A' ? avgPct+'%' : 'N/A'}`;
  }).join('\n');
  return `You are a trading coach analysing coin selection in a crypto fade strategy.

COIN BREAKDOWN:
${lines || '  No data yet.'}

Full trade log for context:
${formatTradeTable()}

Analyse:
1. Which coins have the best win rate and P&L for this trader?
2. Which coins appear to be poor fade candidates based on results?
3. Are there characteristics shared by the best-performing fade targets? (e.g., low-cap, high volatility, speculative sector)
4. Should the trader narrow their watchlist, and if so, to which types of coins?
5. Any coins that appear in the log multiple times — is there a pattern in repeat trades?`;
}

function buildImprovementPrompt() {
  const s = getTradeSnapshot();
  return `You are a trading coach giving a trader their concrete improvement roadmap.

Their current results:
${formatTradeTable()}

Stats: ${s.entered.length} entered | ${s.wr.toFixed(1)}% win rate | avg P&L: ${s.avgPct !== null ? s.avgPct.toFixed(2)+'%' : 'N/A'} | total $: ${s.totalDollar !== null ? '$'+s.totalDollar.toFixed(2) : 'N/A'}

Based on ALL the data above, give:
1. The single biggest leak in this strategy right now
2. The single biggest strength to double down on
3. Three specific, actionable changes to make before the next 10 trades
4. A simple rule or filter this trader could add to their pre-trade checklist
5. A realistic expectation: if they fix the main leak, what win rate / P&L improvement is achievable?

Be direct. No fluff. Treat this like a real coaching session.`;
}

let reviewAiRunning = false;

function renderReview() {
  const el = document.getElementById('review-content');
  if (!trades.length) {
    el.innerHTML = '<div class="no-trades-review">No trades logged yet. Add some trades first, then come back for your AI review.</div>';
    return;
  }
  const s = getTradeSnapshot();
  const snapshotHtml = `
  <div class="review-snapshot" style="margin-bottom:20px">
    <div class="snapshot-title">Current Data Snapshot</div>
    <div class="snapshot-grid">
      <div class="snap-item"><div class="snap-label">Signals</div><div class="snap-val yellow">${trades.length}</div></div>
      <div class="snap-item"><div class="snap-label">Entered</div><div class="snap-val blue">${s.entered.length}</div></div>
      <div class="snap-item"><div class="snap-label">Win Rate</div><div class="snap-val ${s.wr >= 60 ? 'green' : s.wr >= 40 ? 'yellow' : 'red'}">${s.wr.toFixed(0)}%</div></div>
      <div class="snap-item"><div class="snap-label">Avg P&L %</div><div class="snap-val ${s.avgPct !== null && s.avgPct >= 0 ? 'green' : 'red'}">${s.avgPct !== null ? (s.avgPct >= 0 ? '+' : '') + s.avgPct.toFixed(2) + '%' : '—'}</div></div>
      <div class="snap-item"><div class="snap-label">Total $</div><div class="snap-val ${s.totalDollar !== null && s.totalDollar >= 0 ? 'green' : 'red'}">${s.totalDollar !== null ? (s.totalDollar >= 0 ? '+$' : '-$') + Math.abs(s.totalDollar).toFixed(0) : '—'}</div></div>
    </div>
  </div>`;

  const sidebarHtml = PROMPT_TYPES.map(pt => `
    <div class="prompt-card ${pt.id === activePromptId ? 'active' : ''}" onclick="selectPrompt('${pt.id}')">
      <div class="pc-label">${pt.cat}</div>
      <div class="pc-title">${pt.title}</div>
      <div class="pc-desc">${pt.desc}</div>
    </div>`).join('');

  el.innerHTML = snapshotHtml + `
  <div class="review-layout">
    <div class="prompt-sidebar">${sidebarHtml}</div>
    <div class="review-main" id="review-main"></div>
  </div>`;

  renderPromptPanel();
}

function selectPrompt(id) {
  activePromptId = id;
  document.querySelectorAll('.prompt-card').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') === `selectPrompt('${id}')`);
  });
  renderPromptPanel();
}

function renderPromptPanel() {
  const pt = PROMPT_TYPES.find(p => p.id === activePromptId);
  if (!pt) return;
  const promptText = pt.build();
  const main = document.getElementById('review-main');
  if (!main) return;
  main.innerHTML = `
  <div class="prompt-output">
    <div class="po-header">
      <div class="po-title">${pt.title}</div>
      <div class="po-actions">
        <button class="po-btn" onclick="copyPrompt()">Copy prompt</button>
        <button class="po-btn primary" onclick="runAiReview()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:-1px;margin-right:5px"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          Run AI Review
        </button>
      </div>
    </div>
    <div class="prompt-text" id="prompt-display">${promptText.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
  </div>
  <div class="ai-response-wrap" id="ai-response-wrap">
    <div class="air-header">
      <div class="air-dot"></div>
      <div class="air-label">AI Analysis</div>
    </div>
    <div class="air-body" id="ai-response-body"></div>
  </div>`;
  window._currentPrompt = promptText;
}

function copyPrompt() {
  const pt = PROMPT_TYPES.find(p => p.id === activePromptId);
  if (!pt) return;
  navigator.clipboard.writeText(pt.build()).then(() => {
    const btn = document.querySelector('.po-btn:not(.primary)');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy prompt', 1800); }
  });
}

async function runAiReview() {
  if (reviewAiRunning) return;
  reviewAiRunning = true;
  const wrap = document.getElementById('ai-response-wrap');
  const body = document.getElementById('ai-response-body');
  const btn = document.querySelector('.po-btn.primary');
  if (!wrap || !body) return;
  wrap.classList.add('visible');
  body.innerHTML = '<div class="air-thinking"><div class="spinner"></div>Analysing your trades...</div>';
  if (btn) { btn.disabled = true; btn.textContent = 'Running...'; }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: window._currentPrompt }]
      })
    });
    const data = await response.json();
    const text = data.content && data.content[0] ? data.content[0].text : 'No response received.';
    // Format response: bold **text** and newlines
    const formatted = text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    body.innerHTML = formatted;
  } catch (err) {
    body.innerHTML = '<span style="color:var(--red)">Error connecting to AI. Check your network and try again.</span>';
  }

  reviewAiRunning = false;
  if (btn) { btn.disabled = false; btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:-1px;margin-right:5px"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Run AI Review'; }
}

function autoCalcPnl() {
  const entry = parseFloat(document.getElementById('m-entry').value);
  const exit = parseFloat(document.getElementById('m-exit').value);
  const pctEl = document.getElementById('m-pct');
  if (entry && exit && entry > 0) {
    // FADE trades are shorts: profit when price falls from entry to exit
    const pct = ((entry - exit) / entry * 100);
    pctEl.value = pct.toFixed(3);
    pctEl.style.color = pct >= 0 ? 'var(--green)' : 'var(--red)';
  } else {
    pctEl.value = '';
    pctEl.style.color = 'var(--text2)';
  }
}

let selectedCloseReason = null;

function toggleCloseReason(val) {
  if (selectedCloseReason === val) {
    selectedCloseReason = null;
    document.getElementById('cr-target').className = 'cr-btn';
    document.getElementById('cr-time').className = 'cr-btn';
  } else {
    selectedCloseReason = val;
    document.getElementById('cr-target').className = val === 'target' ? 'cr-btn active-target' : 'cr-btn';
    document.getElementById('cr-time').className = val === 'time' ? 'cr-btn active-time' : 'cr-btn';
  }
}

function saveManual() {
  const coin = document.getElementById('m-coin').value.trim().toUpperCase();
  if (!coin) { alert('Coin is required'); return; }
  const entry = parseFloat(document.getElementById('m-entry').value) || null;
  const exit = parseFloat(document.getElementById('m-exit').value) || null;
  let pnl = parseFloat(document.getElementById('m-pnl').value) || null;
  // auto-calc % pnl from entry/exit (short trade: profit = entry > exit)
  let pct_pnl = null;
  if (entry && exit && entry > 0) {
    pct_pnl = parseFloat(((entry - exit) / entry * 100).toFixed(3));
  }
  trades.unshift({
    id: Date.now(), coin,
    outcome: document.getElementById('m-outcome').value,
    gain_24h: parseFloat(document.getElementById('m-gain').value) || null,
    vol_spike: null, entry, exit, pnl, pct_pnl,
    close_reason: selectedCloseReason,
    notes: '',
    date: new Date().toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' }),
    ts: Date.now()
  });
  save();
  renderTrades();
  ['m-coin','m-entry','m-exit','m-pnl','m-gain'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('m-pct').value = '';
  document.getElementById('m-pct').style.color = 'var(--text2)';
  document.getElementById('m-outcome').value = 'watching';
  selectedCloseReason = null;
  document.getElementById('cr-target').className = 'cr-btn';
  document.getElementById('cr-time').className = 'cr-btn';
}

function deleteTrade(id) {
  trades = trades.filter(t => t.id !== id);
  save();
  renderTrades();
}

function clearAll() {
  if (!confirm('Clear all trades?')) return;
  trades = [];
  save();
  renderTrades();
}

const OUTCOME_META = {
  fullwin:      { label: 'Full Win',      cls: 'b-fullwin' },
  partwin:      { label: 'Partial Win',   cls: 'b-partwin' },
  watching:     { label: 'Watching',      cls: 'b-watching' },
  partloss:     { label: 'Partial Loss',  cls: 'b-partloss' },
  stopped:      { label: 'Stopped Out',   cls: 'b-stopped' },
  neverentered: { label: 'Never Entered', cls: 'b-neverentered' }
};

function fmtPrice(n) {
  if (!n) return '—';
  if (n < 0.001) return '$' + n.toFixed(6);
  if (n < 1) return '$' + n.toFixed(4);
  return '$' + n.toFixed(4);
}

function renderTrades() {
  const list = document.getElementById('trade-list');
  const empty = document.getElementById('empty-state');
  if (!trades.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = trades.map(t => {
    const om = OUTCOME_META[t.outcome] || OUTCOME_META.watching;
    const pnl = t.pnl;
    let pnlHtml = '<span class="pnl-neu">—</span>';
    if (pnl !== null && !isNaN(pnl)) {
      const cls = pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
      pnlHtml = `<span class="${cls}">${pnl >= 0 ? '+' : ''}$${Math.abs(pnl).toFixed(2)}</span>`;
    }
    let pct = t.pct_pnl;
    if ((pct === null || pct === undefined) && t.entry && t.exit && t.entry > 0) {
      pct = parseFloat(((t.entry - t.exit) / t.entry * 100).toFixed(3));
    }
    let pctHtml = '<span class="pnl-neu">—</span>';
    if (pct !== null && pct !== undefined && !isNaN(pct)) {
      const cls = pct >= 0 ? 'pnl-pos' : 'pnl-neg';
      pctHtml = `<span class="${cls}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</span>`;
    }
    const hasShot = !!t.screenshot;
    const shotHtml = hasShot ? `<div class="tr-screenshot" id="ss-${t.id}" style="display:block;padding:0 1.25rem 1rem;">
      <img src="${t.screenshot}" onclick="openLightbox('${t.id}')" title="Click to enlarge" />
    </div>` : `<div class="tr-screenshot" id="ss-${t.id}"></div>`;
    return `<div class="trade-row-wrap" id="wrap-${t.id}">
      <div class="trade-row">
        <div>
          <div class="tr-coin">${t.coin.replace('USDT','').replace('USDT.P','')}</div>
          <div class="tr-meta">${t.date}${t.gain_24h ? ' · +' + t.gain_24h + '%' : ''}</div>
        </div>
        <div><div class="tr-cell-label">Entry</div><div class="tr-cell-val">${fmtPrice(t.entry)}</div></div>
        <div><div class="tr-cell-label">Exit</div><div class="tr-cell-val">${fmtPrice(t.exit)}</div></div>
        <div><div class="tr-cell-label">P&L %</div>${pctHtml}</div>
        <div><div class="tr-cell-label">P&L $</div>${pnlHtml}</div>
        <div>
          <span class="badge ${om.cls}">${om.label}</span>
          ${t.close_reason === 'target' ? '<div><span class="cr-badge target">Hit Target</span></div>' : ''}
          ${t.close_reason === 'time' ? '<div><span class="cr-badge time">Time Stopped</span></div>' : ''}
        </div>
        <div class="ss-actions">
          <label class="ss-btn ${hasShot ? 'has-shot' : ''}" title="${hasShot ? 'Replace screenshot' : 'Add screenshot'}">
            ${hasShot ? '📷 View' : '📷 Add'}
            <input type="file" accept="image/*" style="display:none" onchange="attachScreenshot(${t.id}, this)" />
          </label>
          ${hasShot ? `<button class="ss-btn" onclick="removeScreenshot(${t.id})" style="font-size:10px;padding:3px 7px;color:var(--text3)">✕ rm</button>` : ''}
          <button class="del-btn" onclick="deleteTrade(${t.id})" style="margin-top:2px">×</button>
        </div>
      </div>
      ${shotHtml}
    </div>`;
  }).join('');
}

function renderStats() {
  const el = document.getElementById('stats-content');
  if (!trades.length) {
    el.innerHTML = '<div class="no-stats">No trades yet. Log some trades to see your stats.</div>';
    return;
  }

  const entered = trades.filter(t => ['fullwin','partwin','partloss','stopped'].includes(t.outcome));
  const wins = trades.filter(t => ['fullwin','partwin'].includes(t.outcome));
  const losses = trades.filter(t => ['partloss','stopped'].includes(t.outcome));
  const fullWins = trades.filter(t => t.outcome === 'fullwin');
  const stopped = trades.filter(t => t.outcome === 'stopped');
  const neverEntered = trades.filter(t => t.outcome === 'neverentered');

  const wr = entered.length ? (wins.length / entered.length * 100) : 0;
  const pnls = entered.map(t => t.pnl).filter(p => p !== null && !isNaN(p));
  const pnlPcts = entered.map(t => {
    if (t.pct_pnl !== null && t.pct_pnl !== undefined) return t.pct_pnl;
    if (t.entry && t.exit) return ((t.entry - t.exit) / t.entry * 100);
    return null;
  }).filter(p => p !== null && !isNaN(p));
  const winPnls = wins.map(t => t.pnl).filter(p => p !== null && !isNaN(p));
  const lossPnls = losses.map(t => t.pnl).filter(p => p !== null && !isNaN(p));
  const winPcts = wins.map(t => t.pct_pnl || (t.entry && t.exit ? ((t.entry-t.exit)/t.entry*100) : null)).filter(p=>p!==null&&!isNaN(p));
  const lossPcts = losses.map(t => t.pct_pnl || (t.entry && t.exit ? ((t.entry-t.exit)/t.entry*100) : null)).filter(p=>p!==null&&!isNaN(p));
  const avgWin = winPnls.length ? winPnls.reduce((a,b)=>a+b,0)/winPnls.length : null;
  const avgLoss = lossPnls.length ? lossPnls.reduce((a,b)=>a+b,0)/lossPnls.length : null;
  const avgWinPct = winPcts.length ? winPcts.reduce((a,b)=>a+b,0)/winPcts.length : null;
  const avgLossPct = lossPcts.length ? lossPcts.reduce((a,b)=>a+b,0)/lossPcts.length : null;
  const totalPnl = pnls.reduce((a,b)=>a+b,0);
  const expectancy = (avgWin !== null && avgLoss !== null && entered.length)
    ? ((wr/100) * avgWin + (1 - wr/100) * avgLoss) : null;
  const rr = (avgWin !== null && avgLoss !== null && avgLoss !== 0)
    ? Math.abs(avgWin / avgLoss) : null;
  const maxWin = winPnls.length ? Math.max(...winPnls) : null;
  const maxLoss = lossPnls.length ? Math.min(...lossPnls) : null;
  const avgPct = pnlPcts.length ? pnlPcts.reduce((a,b)=>a+b,0)/pnlPcts.length : null;

  // Best/worst trade
  const withPnl = entered.filter(t => t.pnl !== null && !isNaN(t.pnl));
  const bestTrade = withPnl.length ? withPnl.reduce((a,b)=>a.pnl>b.pnl?a:b) : null;
  const worstTrade = withPnl.length ? withPnl.reduce((a,b)=>a.pnl<b.pnl?a:b) : null;

  // Streak calculation
  const orderedTrades = [...entered].reverse();
  let curStreak = 0, maxWinStreak = 0, maxLossStreak = 0, tmpW = 0, tmpL = 0;
  let lastWas = null;
  orderedTrades.forEach(t => {
    const isW = ['fullwin','partwin'].includes(t.outcome);
    if (isW) { tmpW++; tmpL = 0; } else { tmpL++; tmpW = 0; }
    maxWinStreak = Math.max(maxWinStreak, tmpW);
    maxLossStreak = Math.max(maxLossStreak, tmpL);
    lastWas = isW;
  });
  // current streak from most recent
  const recent = [...entered];
  if (recent.length) {
    const firstIsWin = ['fullwin','partwin'].includes(recent[0].outcome);
    curStreak = 0;
    for (const t of recent) {
      const w = ['fullwin','partwin'].includes(t.outcome);
      if (w === firstIsWin) curStreak++; else break;
    }
    if (!firstIsWin) curStreak = -curStreak;
  }

  // Close reason split
  const enteredClosed = entered.filter(t => t.close_reason);
  const hitTarget = entered.filter(t => t.close_reason === 'target');
  const timeStopped = entered.filter(t => t.close_reason === 'time');
  const htWr = hitTarget.length ? (hitTarget.filter(t=>['fullwin','partwin'].includes(t.outcome)).length/hitTarget.length*100) : null;
  const tsWr = timeStopped.length ? (timeStopped.filter(t=>['fullwin','partwin'].includes(t.outcome)).length/timeStopped.length*100) : null;

  // 24h gain buckets
  const withGain = entered.filter(t => t.gain_24h !== null);
  const buckets = [
    { label: '< 30%',   min: 0,   max: 30  },
    { label: '30–60%',  min: 30,  max: 60  },
    { label: '60–100%', min: 60,  max: 100 },
    { label: '100–200%',min: 100, max: 200 },
    { label: '200%+',   min: 200, max: Infinity },
  ].map(b => {
    const ts = withGain.filter(t => t.gain_24h >= b.min && t.gain_24h < b.max);
    const bWins = ts.filter(t => ['fullwin','partwin'].includes(t.outcome));
    const bPcts = ts.map(t => t.pct_pnl || (t.entry&&t.exit?((t.entry-t.exit)/t.entry*100):null)).filter(p=>p!==null&&!isNaN(p));
    return { ...b, count: ts.length, winRate: ts.length ? (bWins.length/ts.length*100) : null, avgPct: bPcts.length ? bPcts.reduce((a,b)=>a+b,0)/bPcts.length : null };
  }).filter(b => b.count > 0);

  // Ticker breakdown
  const tickerMap = {};
  entered.forEach(t => {
    const k = t.coin.replace('USDT','').replace('USDT.P','');
    if (!tickerMap[k]) tickerMap[k] = { wins:0, total:0, pnl:[], pct:[] };
    tickerMap[k].total++;
    if (['fullwin','partwin'].includes(t.outcome)) tickerMap[k].wins++;
    if (t.pnl !== null && !isNaN(t.pnl)) tickerMap[k].pnl.push(t.pnl);
    const p = t.pct_pnl || (t.entry&&t.exit?((t.entry-t.exit)/t.entry*100):null);
    if (p !== null && !isNaN(p)) tickerMap[k].pct.push(p);
  });
  const tickers = Object.entries(tickerMap).sort((a,b) => b[1].total - a[1].total).slice(0,10);

  // Equity curve
  const equityTrades = [...entered].reverse();
  let equity = getStartingBalance();
  const equityPoints = [equity];
  equityTrades.forEach(t => {
    if (t.pnl !== null && !isNaN(t.pnl)) { equity += t.pnl; equityPoints.push(equity); }
  });
  const roiPct = ((equityPoints[equityPoints.length-1] - equityPoints[0]) / equityPoints[0] * 100);

  // Outcome counts for donut
  const outcomeCounts = { fullwin:0, partwin:0, partloss:0, stopped:0, neverentered:0, watching:0 };
  trades.forEach(t => { if (outcomeCounts[t.outcome] !== undefined) outcomeCounts[t.outcome]++; });

  el.innerHTML = `
  <div class="balance-row">
    <div class="balance-label">Starting Balance</div>
    <div class="balance-input-wrap">
      <div class="balance-prefix">$</div>
      <input class="balance-input" id="starting-balance" type="number" value="${getStartingBalance()}" placeholder="10000" oninput="saveStartingBalance(this.value); rebuildEquity()" />

    <div class="kpi"><div class="kpi-label">Win Rate</div><div class="kpi-val ${wr>=60?'green':wr>=40?'yellow':'red'}">${entered.length?wr.toFixed(0)+'%':'—'}</div><div class="kpi-sub">${wins.length}W · ${losses.length}L</div></div>
    <div class="kpi"><div class="kpi-label">Total P&L</div><div class="kpi-val ${totalPnl>=0?'green':'red'}">${pnls.length?(totalPnl>=0?'+':'')+  '$'+totalPnl.toFixed(2):'—'}</div><div class="kpi-sub">all entered trades</div></div>
    <div class="kpi"><div class="kpi-label">ROI</div><div class="kpi-val ${roiPct>=0?'green':'red'}">${pnls.length?(roiPct>=0?'+':'')+roiPct.toFixed(1)+'%':'—'}</div><div class="kpi-sub">on starting balance</div></div>
    <div class="kpi"><div class="kpi-label">Avg P&L %</div><div class="kpi-val ${avgPct!==null&&avgPct>=0?'green':'red'}">${avgPct!==null?(avgPct>=0?'+':'')+avgPct.toFixed(2)+'%':'—'}</div><div class="kpi-sub">per entered trade</div></div>
    <div class="kpi"><div class="kpi-label">Expectancy</div><div class="kpi-val ${expectancy!==null&&expectancy>=0?'green':'red'}">${expectancy!==null?(expectancy>=0?'+$':'-$')+Math.abs(expectancy).toFixed(2):'—'}</div><div class="kpi-sub">per trade</div></div>

    <div class="kpi"><div class="kpi-label">Avg Loser</div><div class="kpi-val red">${avgLoss!==null?'-$'+Math.abs(avgLoss).toFixed(2):'—'}</div><div class="kpi-sub">${avgLossPct!==null?'avg '+avgLossPct.toFixed(2)+'%':''}</div></div>

      <div class="donut-wrap">
        <svg class="donut-svg" width="120" height="120" viewBox="0 0 120 120" id="donut-svg"></svg>
        <div class="donut-legend" id="donut-legend"></div>
      </div>
    </div>
  </div>

  <div class="section-label">Signal Quality — 24h Gain Buckets</div>
  <div class="chart-card" style="margin-bottom:16px">
    <div class="chart-title">Win rate & avg P&L by pump size at entry</div>
    ${buckets.length ? `
    <table class="bucket-table">
      <thead><tr><th>24h Gain Range</th><th>Trades</th><th>Win Rate</th><th>Avg P&L %</th><th>Signal strength</th></tr></thead>
      <tbody>${buckets.map(b => {
        const barW = b.winRate !== null ? b.winRate : 0;
        const col = barW >= 60 ? 'var(--green)' : barW >= 40 ? 'var(--yellow)' : 'var(--red)';
        return `<tr>
          <td>${b.label}</td>
          <td>${b.count}</td>
          <td style="color:${col}">${b.winRate!==null?b.winRate.toFixed(0)+'%':'—'}</td>
          <td style="color:${b.avgPct!==null&&b.avgPct>=0?'var(--green)':'var(--red)'}">${b.avgPct!==null?(b.avgPct>=0?'+':'')+b.avgPct.toFixed(2)+'%':'—'}</td>
          <td><div style="height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;width:100px"><div style="height:100%;width:${barW}%;background:${col};border-radius:3px;transition:width 0.4s ease"></div></div></td>
        </tr>`;
      }).join('')}</tbody>
    </table>` : '<div style="color:var(--text3);font-size:13px">Add 24h gain data to your trades to see this breakdown.</div>'}
  </div>

  <div class="section-label">Coin Breakdown</div>
  <div class="full-col chart-card">
    <div class="chart-title">Top coins — win rate, P&L, signal count</div>
    ${tickers.length ? `<table class="ticker-table">
      <thead><tr><th>Coin</th><th>Signals</th><th>Wins</th><th>Win Rate</th><th>Total P&L $</th><th>Avg P&L %</th><th>Best trade</th></tr></thead>
      <tbody>${tickers.map(([coin, d]) => {
        const wrC = d.total ? (d.wins/d.total*100) : 0;
        const totalP = d.pnl.reduce((a,b)=>a+b,0);
        const avgP = d.pnl.length ? totalP/d.pnl.length : null;
        const avgPctC = d.pct.length ? d.pct.reduce((a,b)=>a+b,0)/d.pct.length : null;
        const best = d.pnl.length ? Math.max(...d.pnl) : null;
        const col = wrC >= 60 ? 'var(--green)' : wrC >= 40 ? 'var(--yellow)' : 'var(--red)';
        return `<tr>
          <td>${coin}</td>
          <td>${d.total}</td>
          <td>${d.wins}</td>
          <td style="color:${col}">${d.total?wrC.toFixed(0)+'%':'—'}</td>
          <td style="color:${totalP>=0?'var(--green)':'var(--red)'}">${d.pnl.length?(totalP>=0?'+$':'-$')+Math.abs(totalP).toFixed(2):'—'}</td>
          <td style="color:${avgPctC!==null&&avgPctC>=0?'var(--green)':'var(--red)'}">${avgPctC!==null?(avgPctC>=0?'+':'')+avgPctC.toFixed(2)+'%':'—'}</td>
          <td style="color:var(--green)">${best!==null?'+$'+best.toFixed(2):'—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>` : '<div style="color:var(--text3);font-size:13px;padding:1rem 0">No completed trades yet.</div>'}
  </div>`;

  // Individual trade P&L bars
  const barTrades = [...entered].filter(t => t.pct_pnl !== null || (t.entry && t.exit));
  const maxAbs = Math.max(...barTrades.map(t => Math.abs(t.pct_pnl || ((t.entry-t.exit)/t.entry*100) || 0)), 1);
  document.getElementById('trade-pnl-bars').innerHTML = barTrades.slice(0,20).map(t => {
    const p = t.pct_pnl !== null ? t.pct_pnl : ((t.entry-t.exit)/t.entry*100);
    const w = Math.min(Math.abs(p) / maxAbs * 100, 100);
    const coin = t.coin.replace('USDT','').replace('USDT.P','');
    const cls = p >= 0 ? 'pos' : 'neg';
    return `<div class="trade-pnl-bar-row">
      <div class="tpb-coin">${coin}</div>
      <div class="tpb-track">
        <div class="tpb-fill ${cls}" style="width:${w}%">${p>=0?'+':''}${p.toFixed(1)}%</div>
      </div>
    </div>`;
  }).join('');

  // Draw donut
  drawDonut(outcomeCounts, trades.length);

  // Draw equity
  window._equityPoints = equityPoints;
  requestAnimationFrame(() => drawEquity(equityPoints));
}

function getStartingBalance() {
  return parseFloat(localStorage.getItem('fade-starting-balance') || '10000') || 10000;
}

function saveStartingBalance(val) {
  const n = parseFloat(val);
  if (!isNaN(n) && n > 0) localStorage.setItem('fade-starting-balance', n);
}

function rebuildEquity() {
  if (!window._equityPoints) return;
  const entered = trades.filter(t => ['fullwin','partwin','partloss','stopped'].includes(t.outcome));
  const equityTrades = [...entered].reverse();
  let equity = getStartingBalance();
  const pts = [equity];
  equityTrades.forEach(t => {
    if (t.pnl !== null && !isNaN(t.pnl)) { equity += t.pnl; pts.push(equity); }
  });
  window._equityPoints = pts;
  requestAnimationFrame(() => drawEquity(pts));
}

function drawDonut(counts, total) {
  const svg = document.getElementById('donut-svg');
  if (!svg) return;
  const COLORS = {
    fullwin: '#3DD68C', partwin: '#2aa868',
    partloss: '#cc4444', stopped: '#FF5252',
    neverentered: '#55555F', watching: '#F5C842'
  };
  const LABELS = { fullwin: 'Full win', partwin: 'Part win', partloss: 'Part loss', stopped: 'Stopped', neverentered: 'No entry', watching: 'Watching' };
  const cx = 60, cy = 60, r = 44, inner = 28;
  let angle = -Math.PI / 2;
  const entries = Object.entries(counts).filter(([,v]) => v > 0);
  let paths = '';
  const legendItems = [];
  entries.forEach(([key, val]) => {
    const slice = (val / total) * Math.PI * 2;
    const x1 = cx + r * Math.cos(angle);
    const y1 = cy + r * Math.sin(angle);
    const x2 = cx + r * Math.cos(angle + slice);
    const y2 = cy + r * Math.sin(angle + slice);
    const xi1 = cx + inner * Math.cos(angle);
    const yi1 = cy + inner * Math.sin(angle);
    const xi2 = cx + inner * Math.cos(angle + slice);
    const yi2 = cy + inner * Math.sin(angle + slice);
    const large = slice > Math.PI ? 1 : 0;
    paths += `<path d="M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${inner},${inner} 0 ${large},0 ${xi1},${yi1}" fill="${COLORS[key] || '#888'}" opacity="0.9"/>`;
    legendItems.push({ key, val, color: COLORS[key] || '#888', label: LABELS[key] || key });
    angle += slice;
  });
  svg.innerHTML = paths + `<text x="60" y="56" text-anchor="middle" fill="#F0F0F2" font-size="16" font-family="Syne" font-weight="700">${total}</text><text x="60" y="70" text-anchor="middle" fill="#55555F" font-size="10" font-family="DM Mono">total</text>`;
  const leg = document.getElementById('donut-legend');
  if (leg) leg.innerHTML = legendItems.map(d => `<div class="legend-row"><div class="legend-dot" style="background:${d.color}"></div><span class="legend-label">${d.label}</span><span class="legend-val">${d.val}</span></div>`).join('');
}

function drawEquity(points) {
  const canvas = document.getElementById('equity-canvas');
  if (!canvas || points.length < 2) return;
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.clientWidth || 400;
  const h = wrap.clientHeight || 180;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const min = Math.min(...points), max = Math.max(...points);
  const pad = { t: 10, b: 24, l: 8, r: 8 };
  const pw = w - pad.l - pad.r, ph = h - pad.t - pad.b;
  const mapX = i => pad.l + (i / (points.length - 1)) * pw;
  const mapY = v => pad.t + (1 - (v - min) / (max - min || 1)) * ph;

  // grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  [0.25,0.5,0.75].forEach(r => {
    const y = pad.t + r * ph;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
  });

  // fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, h - pad.b);
  const isUp = points[points.length-1] >= points[0];
  grad.addColorStop(0, isUp ? 'rgba(61,214,140,0.25)' : 'rgba(255,82,82,0.25)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.moveTo(mapX(0), mapY(points[0]));
  points.forEach((v,i) => { if(i>0) ctx.lineTo(mapX(i), mapY(v)); });
  ctx.lineTo(mapX(points.length-1), h - pad.b);
  ctx.lineTo(mapX(0), h - pad.b);
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // line
  ctx.beginPath();
  ctx.moveTo(mapX(0), mapY(points[0]));
  points.forEach((v,i) => { if(i>0) ctx.lineTo(mapX(i), mapY(v)); });
  ctx.strokeStyle = isUp ? '#3DD68C' : '#FF5252';
  ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.stroke();

  // labels
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '10px DM Mono, monospace';
  ctx.fillText('$' + Math.round(points[0]).toLocaleString(), pad.l, h - 6);
  const last = '$' + Math.round(points[points.length-1]).toLocaleString();
  ctx.fillText(last, w - pad.r - ctx.measureText(last).width, h - 6);
}

function attachScreenshot(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const trade = trades.find(t => t.id === id);
    if (!trade) return;
    trade.screenshot = e.target.result;
    save();
    renderTrades();
  };
  reader.readAsDataURL(file);
}

function removeScreenshot(id) {
  const trade = trades.find(t => t.id === id);
  if (!trade) return;
  trade.screenshot = null;
  save();
  renderTrades();
}

function openLightbox(id) {
  const trade = trades.find(t => t.id == id);
  if (!trade || !trade.screenshot) return;
  document.getElementById('lightbox-img').src = trade.screenshot;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

renderTrades();
updateNavCount();
</script>
</body>
